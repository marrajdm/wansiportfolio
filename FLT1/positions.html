<!DOCTYPE html>
<html lang="en">
<head>
    <title>CSS Positions</title>
</head>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:white;
    height:3000px;
}

.product{
    position:relative;
    display:inline-block;
    background:#f8f3f3;
    padding:25px;
    margin-top:50px;
}

.product img{
    width:280px;
    display:block;
}

.close-btn{ 
    position:absolute; 
    top:10px; 
    right:10px; 
    width:25px; 
    height:25px; 
    border-radius:20px; 
    background:black; 
    color:white; 
    cursor:pointer; 
}

.tag{
    position:absolute;
    top:25px;
    right:25px;
    background:black;
    color:white;
    padding:6px 12px;
    font-size:13px;
}

.cover{
    position:absolute;
    left:25px;
    bottom:25px;
    width:320px;
    height:180px;
    background:rgba(255, 251, 251, 0.75);
}

.cover button{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    padding:8px 18px;
    border:1px solid black;
    background:white;
    cursor:pointer;
}

.cover button:hover{
    background:black;
    color:white;
}
</style>
</head>

<body>

<button class="close-btn">x</button>

<div class="product">
    <img src="shirt.jpg" alt="Clothing">

    <div class="tag">20% OFF</div>

    <div class="cover">
        <button>Add to Cart</button>
    </div>
</div>

</body>
</html>
